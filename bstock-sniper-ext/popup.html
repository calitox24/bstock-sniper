<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BStock Sniper</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#07111f;color:#e0f2fe;font-family:'Segoe UI',Arial,sans-serif;
  font-size:13px;min-width:860px;min-height:200px;
}
header{
  background:#0f2138;padding:10px 16px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1);
}
.logo{font-size:15px;font-weight:900;color:#38bdf8;}
.logo span{color:#e0f2fe;font-weight:400;}
#status-bar{font-size:11px;color:#94a3b8;}
#status-bar.ok{color:#86efac;}
#status-bar.err{color:#fca5a5;}
#btn-reload{background:#1e3a5f;color:#93c5fd;border:none;border-radius:6px;
  padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600;}
#btn-reload:hover{background:#2d5080;}

table{width:100%;border-collapse:collapse;}
th{text-align:left;color:#64748b;font-weight:600;font-size:10px;
  text-transform:uppercase;letter-spacing:.4px;padding:8px 10px 6px;
  border-bottom:1px solid rgba(255,255,255,.08);}
td{padding:10px 10px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}

.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.b-green{background:rgba(52,201,138,.2);color:#86efac;}
.b-red{background:rgba(240,84,84,.2);color:#fca5a5;}
.b-amber{background:rgba(245,166,35,.2);color:#fcd34d;}
.b-blue{background:rgba(79,142,247,.2);color:#93c5fd;}
.b-muted{background:rgba(255,255,255,.07);color:#64748b;}

.num{font-variant-numeric:tabular-nums;font-weight:600;}
.muted{color:#64748b;}

input[type=number]{
  background:#020617;color:#fff;border:1px solid #1e3a5f;
  border-radius:6px;padding:5px 7px;font-size:12px;font-weight:700;
  text-align:right;width:100%;
}
input[type=number]:focus{outline:none;border-color:#38bdf8;}

/* Toggle switch */
.toggle-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.toggle{position:relative;width:38px;height:21px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.slider{position:absolute;inset:0;border-radius:21px;background:#1e3a5f;transition:.2s;}
.slider:before{content:'';position:absolute;width:15px;height:15px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:.2s;}
input:checked + .slider{background:#15803d;}
input:checked + .slider:before{left:20px;}
.toggle-lbl{font-size:10px;font-weight:700;}

/* Motivo pill */
.motivo{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;}
.m-off{background:#0f2138;color:#475569;}
.m-win{background:#14532d;color:#86efac;}
.m-dis{background:#7f1d1d;color:#fca5a5;}
.m-wait{background:#1e3a5f;color:#93c5fd;}
.m-cfg{background:#78350f;color:#fcd34d;}

/* Accion buttons */
.btn-pujar{
  background:#15803d;color:#fff;border:none;border-radius:6px;
  padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;
  width:100%;white-space:nowrap;
}
.btn-pujar:hover{background:#166534;}
.btn-pujar:disabled{background:#1e3a5f;color:#475569;cursor:default;}
.btn-abrir{
  display:block;background:#1e3a5f;color:#93c5fd;border:none;border-radius:6px;
  padding:5px 12px;cursor:pointer;font-size:11px;font-weight:600;
  text-align:center;text-decoration:none;margin-top:4px;
}
.btn-abrir:hover{background:#2d5080;}

.result-lbl{font-size:10px;text-align:center;margin-top:4px;min-height:13px;}

.cd-red{color:#f87171;font-weight:700;}
.cd-amber{color:#fcd34d;font-weight:700;}

.empty{text-align:center;padding:40px;color:#475569;}

#loading{text-align:center;padding:30px;color:#475569;}
</style>
</head>
<body>
<header>
  <div class="logo">BStock <span>Sniper</span></div>
  <div id="status-bar">Conectando a server.py...</div>
  <button id="btn-reload">Actualizar</button>
</header>

<div id="loading">Cargando subastas activas...</div>
<div id="content" style="display:none;padding:8px 0;">
  <table>
    <thead>
      <tr>
        <th>Subasta</th>
        <th>Estado</th>
        <th>Tiempo</th>
        <th>P. Act</th>
        <th>Proxima</th>
        <th>QTY</th>
        <th>$/u Act</th>
        <th style="width:90px;">Max $/u</th>
        <th style="width:65px;">Seg.</th>
        <th>Max Total</th>
        <th>ON</th>
        <th>Motivo</th>
        <th>Accion</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script src="popup.js"></script>
</body>
</html>
